name: Build and Deploy the Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Node.js App
        run: npm run build

      - name: Prepare Output
        run: |
          mkdir -p .output
          cp -R dist .output/
          cp -R public .output/
          cp package.json .output/
          cp package-lock.json .output/ || true

      - name: Deploy to Server via SCP
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: ".output/*"
          target: "/var/www/noteroom-server"
          strip_components: 1

      - name: Start/Restart Server with PM2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Load NVM and Profile
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            cd /var/www/noteroom-server/
            
            # Install production dependencies
            npm ci --omit=dev

            # Restart or start the PM2 process
            pm2 restart noteroom-server || pm2 start dist/index.js --name noteroom-server
